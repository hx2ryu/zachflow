# sprint-config.yaml — generated by scripts/init-project.sh
# Edit freely; this is your project's source of truth for runs.
#
# This is the EXPECTED output of running the wizard with this example's
# init.config.yaml. Diff your actual sprint-config.yaml against this file
# after running the wizard — they should differ only in the `source:` path.

project_name: my-nextjs-supabase-app
workflows: both
branch_prefix: sprint

# Sprint type. "standard" runs the 6-Phase pipeline; "qa-fix" runs the QA-Fix pipeline directly.
type: standard

# QA-Fix configuration. Required when type=qa-fix; also consumed by /sprint --phase=qa-fix.
# Fill these before running /qa-fix.
qa_fix:
  jql: ""
  jira_base_url: ""
  ready_for_qa_transition: "Ready for QA"

repositories:
  app:
    source: ~/dev/<your-nextjs-app>
    base: main
    mode: worktree

# Fallback base branch for repositories without an explicit base.
defaults:
  base: main

# Agent Teams (Harness Design v4).
team:
  teammates:
    - fe-engineer
    - evaluator
  settings:
    eval_retry_limit: 2
    max_parallel_tasks: 4

kb:
  mode: embedded

# Gallery display metadata (optional — consumed by sprint-gallery).
display:
  title: ""
  startDate: ""
  endDate: ""
  status: in-progress
  tags: []
  summary: ""
