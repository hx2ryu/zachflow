name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: python3 -m pip install --quiet pyyaml

      - name: Install workflow symlinks
        run: bash scripts/install-workflows.sh

      - name: Bash script syntax check
        run: |
          for f in scripts/*.sh scripts/lib/*.sh; do
            bash -n "$f" && echo "OK: $f"
          done

      - name: ZZEM-leak scan
        run: |
          # NOTE: grep --exclude / --exclude-dir match BASENAMES only,
          # not paths. Use basename-only patterns here.
          if grep -rE 'ZZEM|zzem-orchestrator|MemeApp|meme-api|meme-pr|zach-wrtn|wrtn\.io|zzem-kb' \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude-dir=superpowers \
            --exclude='CHANGELOG.md' \
            --exclude='CONTRIBUTING.md' \
            --exclude='roadmap.md' \
            --exclude='llm-platform-coupling.md' \
            --exclude='kb-system.md' \
            --exclude='ci.yml' \
            .; then
            echo "FAIL: ZZEM literals leaked into zachflow"
            exit 1
          fi
          echo "PASS: clean of ZZEM literals"

      - name: KB smoke check
        run: bash tests/kb-smoke.sh

      - name: init-project.sh syntax check
        run: bash -n scripts/init-project.sh

      - name: init-project.sh non-interactive smoke
        run: bash tests/init-project-smoke.sh

      - name: install-plugins.sh syntax check
        run: bash -n scripts/install-plugins.sh

      - name: recall plugin unit tests
        run: |
          bash plugins/recall/tests/test_config.sh
          bash plugins/recall/tests/test_session.sh
