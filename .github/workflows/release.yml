name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.1). Must already exist on origin."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "version=${tag#v}" >> $GITHUB_OUTPUT

      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}
          fetch-depth: 0

      - name: Extract changelog section
        run: |
          version="${{ steps.meta.outputs.version }}"
          # Extract the section between "## [<version>]" and the next "## [".
          # Uses index/substr to avoid awk -v regex-escape pitfalls with `\[`.
          awk -v prefix="## [$version]" '
            index($0, prefix) == 1 { capture=1; next }
            capture && substr($0, 1, 4) == "## [" { exit }
            capture { print }
          ' CHANGELOG.md > /tmp/release_notes.md
          echo "--- release notes ---"
          cat /tmp/release_notes.md

      - name: Build create-zachflow tarball
        run: |
          cd packages/create-zachflow
          npm pack --pack-destination "$GITHUB_WORKSPACE"
          ls -la "$GITHUB_WORKSPACE"/create-zachflow-*.tgz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: zachflow ${{ steps.meta.outputs.tag }}
          body_path: /tmp/release_notes.md
          files: create-zachflow-*.tgz
          draft: false
          prerelease: false
